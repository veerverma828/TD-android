name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stamp build number
        # In-app updater (Settings > Storage & about) compares this against the
        # tag_name of the latest GitHub Release ("build-<run_number>") to detect
        # updates — must be set before prebuild so it lands in the JS bundle via
        # expo-constants' extra field.
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.extra = { ...app.expo.extra, buildNumber: ${{ github.run_number }} };
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Prebuild Android project
        run: npx expo prebuild -p android

      - name: Configure release signing
        # expo prebuild regenerates android/ from scratch every run, always wired to
        # the debug keystore — patch in a real release signingConfig afterward so
        # every CI-built APK is signed with our own key instead of the public,
        # well-known Android debug key (see #update-service-404 investigation).
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          node -e "
            const fs = require('fs');
            const path = 'android/app/build.gradle';
            let g = fs.readFileSync(path, 'utf8');
            g = g.replace(
              'signingConfigs {\n        debug {',
              \"signingConfigs {\n        release {\n            storeFile file('release.keystore')\n            storePassword System.getenv('RELEASE_KEYSTORE_PASSWORD')\n            keyAlias System.getenv('RELEASE_KEY_ALIAS')\n            keyPassword System.getenv('RELEASE_KEY_PASSWORD')\n        }\n        debug {\"
            );
            g = g.replace('signingConfig signingConfigs.debug\n            def enableShrinkResources', 'signingConfig signingConfigs.release\n            def enableShrinkResources');
            fs.writeFileSync(path, g);
          "

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
